# VoidDE — picom compositor config
# Enables macOS-style window shadows, blur, and transparency.
# 100% AI-generated for VoidDE.

# ── Backend ────────────────────────────────────────────────────────────────
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

# ── Shadows ────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 18;
shadow-offset-x = -14;
shadow-offset-y = -10;
shadow-opacity = 0.40;
shadow-exclude = [
    "class_g = 'VoidDE-Dock'",
    "class_g = 'VoidDE-Panel'",
    "_NET_WM_WINDOW_TYPE:a *= '_NET_WM_WINDOW_TYPE_DOCK'",
    "_NET_WM_WINDOW_TYPE:a *= '_NET_WM_WINDOW_TYPE_DESKTOP'",
    "_NET_WM_STATE:a *= '_NET_WM_STATE_FULLSCREEN'",
    "name = 'Notification'",
];

# ── Fading ─────────────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.06;
fade-out-step = 0.06;
fade-delta    = 6;
fade-exclude  = [];

# ── Transparency / Opacity ─────────────────────────────────────────────────
inactive-opacity       = 0.94;
active-opacity         = 1.0;
frame-opacity          = 0.90;
inactive-opacity-override = false;
opacity-rule = [
    "90:class_g = 'VoidDE-Launcher'",
    "88:class_g = 'VoidDE-Panel'",
    "82:class_g = 'VoidDE-Dock'",
];

# ── Blur ────────────────────────────────────────────────────────────────────
blur-background = true;
blur-method     = "dual_kawase";
blur-strength   = 8;
blur-background-exclude = [
    "_NET_WM_WINDOW_TYPE:a *= '_NET_WM_WINDOW_TYPE_DESKTOP'",
    "class_g = 'VoidDE-Wallpaper'",
];

# ── Corners ─────────────────────────────────────────────────────────────────
corner-radius = 12;
rounded-corners-exclude = [
    "_NET_WM_WINDOW_TYPE:a *= '_NET_WM_WINDOW_TYPE_DOCK'",
    "_NET_WM_WINDOW_TYPE:a *= '_NET_WM_WINDOW_TYPE_DESKTOP'",
    "_NET_WM_STATE:a *= '_NET_WM_STATE_FULLSCREEN'",
];

# ── Other ───────────────────────────────────────────────────────────────────
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
detect-client-leader   = true;
mark-wmwin-focused     = true;
mark-ovredir-focused   = false;
